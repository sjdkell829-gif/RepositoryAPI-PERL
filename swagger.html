<!DOCTYPE html>
<html>
<head>
    <title>Documentación API Anime</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui.css" />
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui-bundle.js"></script>
    <script>
        const ui = SwaggerUIBundle({
            dom_id: '#swagger-ui',
            spec: {
                openapi: "3.0.0",
                info: {
                    title: "Anime Power API",
                    version: "2.0.0",
                    description: "API con Seguridad, Health Check y validación de 3 cifras."
                },
                paths: {
                    "/cgi-bin/api.pl/health": {
                        "get": {
                            "summary": "Verifica el estado del servidor (Health Check)",
                            "responses": { "200": { "description": "Servidor en línea" } }
                        }
                    },
                    "/cgi-bin/api.pl": {
                        "get": {
                            "summary": "Obtener lista completa o un guerrero por ID",
                            "parameters": [{ "name": "id", "in": "query", "schema": { "type": "integer" } }],
                            "responses": { "200": { "description": "Lista de personajes" } }
                        },
                        "post": {
                            "summary": "Registrar nuevo (Requiere Token)",
                            "parameters": [{ "name": "X-Auth-Token", "in": "header", "required": true, "schema": { "type": "string" } }],
                            "requestBody": { "content": { "application/json": { "schema": { "type": "object" } } } },
                            "responses": { "201": { "description": "Creado" } }
                        },
                        "put": {
                            "summary": "Reemplazo total (Requiere Token)",
                            "parameters": [{ "name": "X-Auth-Token", "in": "header", "required": true, "schema": { "type": "string" } }],
                            "requestBody": { "content": { "application/json": { "schema": { "type": "object" } } } },
                            "responses": { "200": { "description": "Actualizado" } }
                        },
                        "delete": {
                            "summary": "Eliminar por ID (Requiere Token)",
                            "parameters": [
                                { "name": "id", "in": "query", "required": true, "schema": { "type": "integer" } },
                                { "name": "X-Auth-Token", "in": "header", "required": true, "schema": { "type": "string" } }
                            ],
                            "responses": { "200": { "description": "Eliminado" } }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
