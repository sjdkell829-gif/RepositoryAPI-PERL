<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Swagger UI - Anime API</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui.css" />
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui-bundle.js"></script>
    <script>
        SwaggerUIBundle({
            dom_id: '#swagger-ui',
            spec: {
                openapi: "3.0.0",
                info: { 
                    title: "Anime Multiverse API", 
                    version: "2.1.0", 
                    description: "Documentación para el proyecto de Erick. Incluye búsqueda por parámetros." 
                },
                paths: {
                    "/cgi-bin/api.pl": {
                        "get": {
                            "summary": "Listar o Filtrar Personajes",
                            "parameters": [
                                { "name": "id", "in": "query", "description": "ID del guerrero", "schema": { "type": "integer" } },
                                { "name": "universo", "in": "query", "description": "Nombre del universo", "schema": { "type": "string" } }
                            ],
                            "responses": { "200": { "description": "Lista de guerreros encontrada" } }
                        },
                        "post": {
                            "summary": "Registrar nuevo guerrero",
                            "parameters": [
                                { "name": "X-Auth-Token", "in": "header", "required": true, "schema": { "type": "string", "default": "admin123" } }
                            ],
                            "requestBody": {
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "type": "object",
                                            "properties": {
                                                "nombre": { "type": "string", "example": "Goku" },
                                                "universo": { "type": "string", "example": "7" }
                                            }
                                        }
                                    }
                                }
                            },
                            "responses": { "201": { "description": "Guardado con éxito" } }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
