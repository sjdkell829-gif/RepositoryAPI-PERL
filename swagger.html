<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Anime API CRUD - Erick</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
        window.onload = () => {
            window.ui = SwaggerUIBundle({
                // Definimos la configuración directamente aquí para evitar errores de carga
                spec: {
                    "openapi": "3.0.0",
                    "info": { "title": "Anime API CRUD", "version": "1.0.0" },
                    "paths": {
                        "/cgi-bin/api.pl": {
                            "get": { "summary": "Listar personajes", "responses": {"200": {"description": "OK"}} },
                            "post": {
                                "summary": "Agregar personaje",
                                "requestBody": {
                                    "required": true,
                                    "content": {
                                        "application/json": {
                                            "schema": {
                                                "type": "object",
                                                "properties": {
                                                    "nombre": { "type": "string", "example": "Goku" },
                                                    "universo": { "type": "string", "example": "Dragon Ball" },
                                                    "nivel_poder": { "type": "string", "example": "9000" }
                                                }
                                            }
                                        }
                                    }
                                },
                                "responses": {"200": {"description": "OK"}}
                            },
                            "patch": {
                                "summary": "Editar personaje",
                                "requestBody": {
                                    "required": true,
                                    "content": {
                                        "application/json": {
                                            "schema": {
                                                "type": "object",
                                                "properties": {
                                                    "nombre": { "type": "string", "example": "Goku" },
                                                    "universo": { "type": "string", "example": "DB Super" }
                                                }
                                            }
                                        }
                                    }
                                },
                                "responses": {"200": {"description": "OK"}}
                            },
                            "delete": {
                                "summary": "Eliminar personaje",
                                "parameters": [{
                                    "name": "nombre",
                                    "in": "query",
                                    "required": true,
                                    "schema": { "type": "string" }
                                }],
                                "responses": {"200": {"description": "OK"}}
                            }
                        }
                    }
                },
                dom_id: '#swagger-ui',
                presets: [SwaggerUIBundle.presets.apis],
                layout: "BaseLayout"
            });
        };
    </script>
</body>
</html>
