<!DOCTYPE html>
<html>
<head>
    <title>Swagger - Erick API</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui.css" />
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui-bundle.js"></script>
    <script>
        SwaggerUIBundle({
            dom_id: '#swagger-ui',
            spec: {
                openapi: "3.0.0",
                info: { title: "Anime Power API", version: "5.0.0", description: "Soporte completo para CRUD y Filtros" },
                paths: {
                    "/cgi-bin/api.pl": {
                        "get": {
                            "summary": "Obtener / Filtrar Guerreros",
                            "parameters": [
                                { "name": "id", "in": "query", "description": "ID Individual", "schema": { "type": "integer" } },
                                { "name": "universo", "in": "query", "description": "Filtrar por Universo", "schema": { "type": "string" } },
                                { "name": "poder_min", "in": "query", "description": "Poder Minimo", "schema": { "type": "integer" } }
                            ],
                            "responses": { "200": { "description": "OK" } }
                        },
                        "post": {
                            "summary": "Registrar Nuevo",
                            "parameters": [{ "name": "X-Auth-Token", "in": "header", "required": true, "schema": { "type": "string", "default": "admin123" } }],
                            "requestBody": { "content": { "application/json": { "schema": { "type": "object", "properties": { "nombre": { "type": "string" }, "edad": { "type": "integer" }, "universo": { "type": "string" }, "nivel_poder": { "type": "integer" } } } } } },
                            "responses": { "201": { "description": "Creado" } }
                        },
                        "put": {
                            "summary": "Actualizar Existente",
                            "parameters": [{ "name": "X-Auth-Token", "in": "header", "required": true, "schema": { "type": "string", "default": "admin123" } }],
                            "requestBody": { "content": { "application/json": { "schema": { "type": "object", "properties": { "id": { "type": "integer" }, "nombre": { "type": "string" }, "edad": { "type": "integer" }, "universo": { "type": "string" }, "nivel_poder": { "type": "integer" } } } } } },
                            "responses": { "200": { "description": "Actualizado" } }
                        },
                        "delete": {
                            "summary": "Eliminar por ID",
                            "parameters": [
                                { "name": "id", "in": "query", "required": true, "schema": { "type": "integer" } },
                                { "name": "X-Auth-Token", "in": "header", "required": true, "schema": { "type": "string", "default": "admin123" } }
                            ],
                            "responses": { "200": { "description": "Eliminado" } }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
