<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Anime API CRUD - Erick con IDs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
        window.onload = () => {
            window.ui = SwaggerUIBundle({
                spec: {
                    "openapi": "3.0.0",
                    "info": { "title": "Anime API con IDs", "version": "1.1.0" },
                    "paths": {
                        "/cgi-bin/api.pl": {
                            "get": {
                                "summary": "Obtener personajes",
                                "parameters": [{ "name": "id", "in": "query", "description": "ID del personaje (Opcional)", "schema": { "type": "integer" } }],
                                "responses": { "200": { "description": "OK" } }
                            },
                            "post": {
                                "summary": "Agregar personaje (Genera ID solo)",
                                "requestBody": {
                                    "required": true,
                                    "content": { "application/json": { "schema": { "type": "object", "properties": { "nombre": {"type":"string"}, "universo": {"type":"string"}, "nivel_poder": {"type":"string"} } } } }
                                },
                                "responses": { "200": { "description": "Creado" } }
                            },
                            "patch": {
                                "summary": "Editar por ID",
                                "requestBody": {
                                    "required": true,
                                    "content": { "application/json": { "schema": { "type": "object", "properties": { "id": {"type":"integer", "example": 1}, "nombre": {"type":"string"}, "universo": {"type":"string"} } } } }
                                },
                                "responses": { "200": { "description": "Actualizado" } }
                            },
                            "delete": {
                                "summary": "Eliminar por ID",
                                "parameters": [{ "name": "id", "in": "query", "required": true, "schema": { "type": "integer" } }],
                                "responses": { "200": { "description": "Eliminado" } }
                            }
                        }
                    }
                },
                dom_id: '#swagger-ui',
                presets: [SwaggerUIBundle.presets.apis],
                layout: "BaseLayout"
            });
        };
    </script>
</body>
</html>
