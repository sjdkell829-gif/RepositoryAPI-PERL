<!DOCTYPE html>
<html>
<head>
    <title>Documentación API Anime - Registro</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui.css" />
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui-bundle.js"></script>
    <script>
        const ui = SwaggerUIBundle({
            dom_id: '#swagger-ui',
            spec: {
                openapi: "3.0.0",
                info: {
                    title: "Anime Power API",
                    version: "2.5.0",
                    description: "Usa el botón 'Try it out' para registrar personajes."
                },
                paths: {
                    "/cgi-bin/api.pl": {
                        "post": {
                            "summary": "Registrar un nuevo guerrero",
                            "parameters": [
                                {
                                    "name": "X-Auth-Token",
                                    "in": "header",
                                    "required": true,
                                    "description": "Contraseña de admin (admin123)",
                                    "schema": { "type": "string" }
                                }
                            ],
                            "requestBody": {
                                "required": true,
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "type": "object",
                                            "properties": {
                                                "nombre": { "type": "string", "example": "Goku" },
                                                "universo": { "type": "string", "example": "Universo 7" },
                                                "edad": { "type": "integer", "example": 35 },
                                                "nivel_poder": { "type": "integer", "example": 900 }
                                            },
                                            "required": ["nombre", "edad"]
                                        }
                                    }
                                }
                            },
                            "responses": {
                                "201": { "description": "Guerrero guardado exitosamente" }
                            }
                        },
                        "get": {
                            "summary": "Obtener todos los personajes",
                            "responses": { "200": { "description": "Lista cargada" } }
                        }
                    },
                    "/cgi-bin/api.pl/health": {
                        "get": {
                            "summary": "Check de salud del sistema",
                            "responses": { "200": { "description": "OK" } }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
