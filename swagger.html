<!DOCTYPE html>
<html>
<head>
    <title>Documentación Interactiva - Anime API</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui.css" />
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui-bundle.js"></script>
    <script>
        const ui = SwaggerUIBundle({
            dom_id: '#swagger-ui',
            spec: {
                openapi: "3.0.0",
                info: {
                    title: "Anime Power API - Control Total",
                    version: "3.0.0",
                    description: "Panel técnico para gestionar los Guerreros Multiversales."
                },
                paths: {
                    "/cgi-bin/api.pl/health": {
                        "get": {
                            "summary": "Check de salud del servidor",
                            "responses": { "200": { "description": "Servidor activo" } }
                        }
                    },
                    "/cgi-bin/api.pl": {
                        "get": {
                            "summary": "Listar todos o uno por ID",
                            "parameters": [
                                { "name": "id", "in": "query", "description": "ID opcional", "schema": { "type": "integer" } }
                            ],
                            "responses": { "200": { "description": "Lista de personajes" } }
                        },
                        "post": {
                            "summary": "Registrar un guerrero (POST)",
                            "parameters": [{ "name": "X-Auth-Token", "in": "header", "required": true, "schema": { "type": "string" }, "example": "admin123" }],
                            "requestBody": {
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "type": "object",
                                            "properties": {
                                                "nombre": { "type": "string" },
                                                "universo": { "type": "string" },
                                                "edad": { "type": "integer" },
                                                "nivel_poder": { "type": "integer" }
                                            }
                                        }
                                    }
                                }
                            },
                            "responses": { "201": { "description": "Creado" } }
                        },
                        "put": {
                            "summary": "Reemplazar un guerrero existente (PUT)",
                            "parameters": [{ "name": "X-Auth-Token", "in": "header", "required": true, "schema": { "type": "string" }, "example": "admin123" }],
                            "requestBody": {
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "type": "object",
                                            "properties": {
                                                "id": { "type": "integer", "description": "ID del que vas a reemplazar" },
                                                "nombre": { "type": "string" },
                                                "universo": { "type": "string" },
                                                "edad": { "type": "integer" },
                                                "nivel_poder": { "type": "integer" }
                                            }
                                        }
                                    }
                                }
                            },
                            "responses": { "200": { "description": "Actualizado" } }
                        },
                        "delete": {
                            "summary": "Eliminar guerrero por ID",
                            "parameters": [
                                { "name": "id", "in": "query", "required": true, "schema": { "type": "integer" } },
                                { "name": "X-Auth-Token", "in": "header", "required": true, "schema": { "type": "string" }, "example": "admin123" }
                            ],
                            "responses": { "200": { "description": "Borrado" } }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
