<!DOCTYPE html>
<html>
<head>
    <title>Swagger Erick</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui.css" />
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui-bundle.js"></script>
    <script>
        SwaggerUIBundle({
            dom_id: '#swagger-ui',
            spec: {
                openapi: "3.0.0",
                info: { title: "Anime API Simple", version: "1.0.0" },
                paths: {
                    "/cgi-bin/api.pl": {
                        "get": {
                            "summary": "Obtener con filtros",
                            "parameters": [
                                { "name": "id", "in": "query", "schema": { "type": "integer" } },
                                { "name": "universo", "in": "query", "schema": { "type": "string" } }
                            ],
                            "responses": { "200": { "description": "OK" } }
                        },
                        "post": {
                            "summary": "Guardar",
                            "parameters": [{ "name": "X-Auth-Token", "in": "header", "required": true, "schema": { "type": "string", "default": "admin123" } }],
                            "requestBody": { "content": { "application/json": { "schema": { "type": "object", "properties": { "nombre": { "type": "string" }, "universo": { "type": "string" } } } } } },
                            "responses": { "201": { "description": "OK" } }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
