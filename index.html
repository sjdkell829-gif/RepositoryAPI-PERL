<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Anime Power Levels - Erick</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; padding: 20px; text-align: center; }
        .form-box { background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #30363d; max-width: 450px; margin: 0 auto 30px; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 5px; }
        button { border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        .btn-save { background: #238636; color: white; }
        .btn-edit { background: #d29922; color: white; }
        .btn-delete { background: #da3633; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; max-width: 1100px; margin: auto; }
        .card { background: #161b22; padding: 15px; border-radius: 8px; border-left: 5px solid #58a6ff; text-align: left; }
        a { color: #58a6ff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Gestión de Personajes de Anime ⚡</h1>
    <p><a href="/swagger.html">Ver Documentación API (Swagger)</a></p>

    <div class="form-box">
        <h3 id="form-title">Agregar Nuevo Personaje</h3>
        <input type="text" id="nombre" placeholder="Nombre (ej. Shadow)">
        <input type="text" id="universo" placeholder="Universo (ej. Eminence in Shadow)">
        <input type="text" id="poder" placeholder="Nivel de Poder (ej. I am Atomic)">
        <button id="btnAccion" class="btn-save" onclick="guardar()">Guardar Personaje</button>
        <button id="btnCancelar" style="display:none; background:#6e7681;" onclick="limpiarFormulario()">Cancelar</button>
    </div>

    <div class="grid" id="lista-personajes"></div>

    <script>
        const API_URL = '/cgi-bin/api.pl';
        let editando = false;

        function cargarPersonajes() {
            fetch(API_URL).then(r => r.json()).then(res => {
                const contenedor = document.getElementById('lista-personajes');
                contenedor.innerHTML = '';
                res.data.forEach(p => {
                    contenedor.innerHTML += `
                        <div class="card">
                            <h3>${p.nombre}</h3>
                            <p><b>Universo:</b> ${p.universo}</p>
                            <p><b>Poder:</b> ${p.nivel_poder}</p>
                            <button class="btn-edit" onclick="prepararEdicion('${p.nombre}', '${p.universo}', '${p.nivel_poder}')">Editar</button>
                            <button class="btn-delete" onclick="eliminar('${p.nombre}')">Eliminar</button>
                        </div>`;
                });
            }).catch(err => console.error("Error cargando:", err));
        }

        function guardar() {
            const data = {
                nombre: document.getElementById('nombre').value,
                universo: document.getElementById('universo').value,
                nivel_poder: document.getElementById('poder').value
            };

            const metodo = editando ? 'PATCH' : 'POST';

            fetch(API_URL, {
                method: metodo,
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            }).then(() => {
                limpiarFormulario();
                cargarPersonajes();
            });
        }

        function prepararEdicion(n, u, p) {
            document.getElementById('nombre').value = n;
            document.getElementById('universo').value = u;
            document.getElementById('poder').value = p;
            document.getElementById('nombre').disabled = true; // El nombre es la llave
            document.getElementById('btnAccion').innerText = "Actualizar (PATCH)";
            document.getElementById('form-title').innerText = "Editando a " + n;
            document.getElementById('btnCancelar').style.display = "inline-block";
            editando = true;
        }

        function eliminar(nombre) {
            if(confirm('¿Eliminar a ' + nombre + '?')) {
                fetch(`${API_URL}?nombre=${encodeURIComponent(nombre)}`, { method: 'DELETE' })
                .then(() => cargarPersonajes());
            }
        }

        function limpiarFormulario() {
            document.getElementById('nombre').value = '';
            document.getElementById('universo').value = '';
            document.getElementById('poder').value = '';
            document.getElementById('nombre').disabled = false;
            document.getElementById('btnAccion').innerText = "Guardar Personaje";
            document.getElementById('form-title').innerText = "Agregar Nuevo Personaje";
            document.getElementById('btnCancelar').style.display = "none";
            editando = false;
        }

        cargarPersonajes();
    </script>
</body>
</html>
