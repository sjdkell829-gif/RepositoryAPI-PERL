<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Power - Gestión por ID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .id-badge { background-color: #0d6efd; color: white; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
        .table thead { background-color: #212529; color: white; }
        .btn-delete { background-color: #ff4d4d; color: white; border: none; }
        .btn-delete:hover { background-color: #cc0000; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-5">⚔️ Panel de Control de Guerreros</h1>

        <div class="card p-4">
            <h5 class="text-primary mb-3">Registrar Nuevo Guerrero</h5>
            <div class="row g-3">
                <div class="col-md-4"><input type="text" id="post-nombre" class="form-control" placeholder="Nombre (ej. Vegeta)"></div>
                <div class="col-md-3"><input type="text" id="post-universo" class="form-control" placeholder="Universo"></div>
                <div class="col-md-3"><input type="text" id="post-poder" class="form-control" placeholder="Nivel de Poder"></div>
                <div class="col-md-2"><button onclick="agregarPersonaje()" class="btn btn-primary w-100">Guardar</button></div>
            </div>
        </div>

        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="text-success">Guerreros en Base de Datos</h5>
                <button onclick="cargarPersonajes()" class="btn btn-outline-success btn-sm">🔄 Recargar Datos</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Universo</th>
                            <th>Poder</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="card p-4 border-warning">
            <h5 class="text-warning mb-3">Actualizar Guerrero por ID</h5>
            <p class="small text-muted">Busca el ID en la tabla de arriba para saber cuál editar.</p>
            <div class="row g-3">
                <div class="col-md-2"><input type="number" id="patch-id" class="form-control border-warning" placeholder="ID #"></div>
                <div class="col-md-3"><input type="text" id="patch-nombre" class="form-control" placeholder="Nuevo Nombre"></div>
                <div class="col-md-3"><input type="text" id="patch-universo" class="form-control" placeholder="Nuevo Universo"></div>
                <div class="col-md-4"><button onclick="editarPersonaje()" class="btn btn-warning w-100">Modificar Datos</button></div>
            </div>
        </div>
        
        <div class="text-center">
            <a href="swagger.html" target="_blank" class="text-decoration-none text-muted">Abrir Documentación Swagger (JSON)</a>
        </div>
    </div>

    <script>
        const API_URL = '/cgi-bin/api.pl';

        // FUNCIÓN GET: Trae los datos de Perl y los pone en la tabla
        async function cargarPersonajes() {
            try {
                const res = await fetch(API_URL);
                const json = await res.json();
                const tbody = document.getElementById('tabla-cuerpo');
                tbody.innerHTML = '';

                // El JSON viene como { data: [...] }
                json.data.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="id-badge">${p.id}</span></td>
                            <td><strong>${p.nombre}</strong></td>
                            <td>${p.universo}</td>
                            <td><span class="badge bg-light text-dark border">${p.nivel_poder}</span></td>
                            <td>
                                <button onclick="eliminarPersonaje(${p.id})" class="btn btn-sm btn-delete">Eliminar</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar:", error);
            }
        }

        // FUNCIÓN POST: Envía el JSON a Perl
        async function agregarPersonaje() {
            const data = {
                nombre: document.getElementById('post-nombre').value,
                universo: document.getElementById('post-universo').value,
                nivel_poder: document.getElementById('post-poder').value
            };
            await fetch(API_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data) 
            });
            // Limpiar inputs y recargar
            document.getElementById('post-nombre').value = '';
            cargarPersonajes();
        }

        // FUNCIÓN PATCH: Edita usando el ID
        async function editarPersonaje() {
            const data = {
                id: parseInt(document.getElementById('patch-id').value),
                nombre: document.getElementById('patch-nombre').value,
                universo: document.getElementById('patch-universo').value
            };
            await fetch(API_URL, { 
                method: 'PATCH', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data) 
            });
            cargarPersonajes();
        }

        // FUNCIÓN DELETE: Borra por el ID que recibe del botón
        async function eliminarPersonaje(id) {
            if(confirm(`¿Deseas eliminar al guerrero con ID: ${id}?`)) {
                await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
                cargarPersonajes();
            }
        }

        // Cargar datos automáticamente al abrir la página
        window.onload = cargarPersonajes;
    </script>
</body>
</html>
