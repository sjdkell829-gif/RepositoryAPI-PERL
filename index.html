<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Anime CRUD - Erick</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding-top: 50px; }
        .main-card { border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container">
    <div class="card main-card p-4">
        <h2 class="text-center mb-4">⚔️ Registro de Guerreros</h2>
        
        <div class="row g-2 mb-4">
            <input type="hidden" id="p-id">
            <div class="col-md-3"><input type="password" id="pass" class="form-control" placeholder="Token (admin123)"></div>
            <div class="col-md-4"><input type="text" id="p-nom" class="form-control" placeholder="Nombre del Personaje"></div>
            <div class="col-md-3"><input type="text" id="p-uni" class="form-control" placeholder="Universo"></div>
            <div class="col-md-2"><button id="btn-save" onclick="enviar('POST')" class="btn btn-primary w-100">Guardar</button></div>
        </div>

        <table class="table table-hover">
            <thead class="table-dark">
                <tr><th>ID</th><th>Nombre</th><th>Universo</th><th>Acciones</th></tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>
</div>

<script>
    const API = '/cgi-bin/api.pl';

    async function cargar() {
        const res = await fetch(API);
        const data = await res.json();
        const lista = document.getElementById('lista');
        lista.innerHTML = '';
        data.forEach(p => {
            lista.innerHTML += `<tr>
                <td>${p.id}</td>
                <td><b>${p.nombre}</b></td>
                <td>${p.universo}</td>
                <td>
                    <button onclick='prepararEdit(${JSON.stringify(p)})' class="btn btn-sm btn-warning">✏️</button>
                    <button onclick="borrar(${p.id})" class="btn btn-sm btn-danger">🗑️</button>
                </td>
            </tr>`;
        });
    }

    function prepararEdit(p) {
        document.getElementById('p-id').value = p.id;
        document.getElementById('p-nom').value = p.nombre;
        document.getElementById('p-uni').value = p.universo;
        document.getElementById('btn-save').innerText = "Actualizar";
        document.getElementById('btn-save').className = "btn btn-warning w-100";
        document.getElementById('btn-save').onclick = () => enviar('PUT');
    }

    async function enviar(m) {
        const body = { 
            nombre: document.getElementById('p-nom').value, 
            universo: document.getElementById('p-uni').value 
        };
        if(m === 'PUT') body.id = parseInt(document.getElementById('p-id').value);

        await fetch(API, {
            method: m,
            headers: { 
                'X-Auth-Token': document.getElementById('pass').value, 
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify(body)
        });
        location.reload();
    }

    async function borrar(id) {
        if(!confirm("¿Seguro que quieres eliminarlo?")) return;
        await fetch(`${API}?id=${id}`, { 
            method: 'DELETE', 
            headers: { 'X-Auth-Token': document.getElementById('pass').value } 
        });
        cargar();
    }

    window.onload = cargar;
</script>
</body>
</html>
