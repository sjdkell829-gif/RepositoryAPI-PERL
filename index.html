<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Power - Sistema Admin Z</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .id-badge { background-color: #0d6efd; color: white; padding: 5px 12px; border-radius: 8px; font-weight: bold; }
        .rango-badge { font-size: 0.85em; padding: 5px 10px; border-radius: 20px; font-weight: 500; }
        .login-header { background: #212529; color: white; border-radius: 15px 15px 0 0; padding: 15px; }
        .btn-delete { background-color: #ff4d4d; color: white; border: none; }
        .btn-delete:hover { background-color: #cc0000; color: white; }
        .form-label-custom { font-size: 0.85em; color: #6c757d; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-5">⚔️ Gestión de Guerreros Multiversales</h1>

        <div class="card mb-4">
            <div class="login-header">
                <h6 class="m-0">🔑 Control de Acceso Administrador</h6>
            </div>
            <div class="card-body bg-light">
                <div class="row align-items-center">
                    <div class="col-md-8 text-muted small">
                        Se requiere contraseña para <b>Registrar, Editar o Eliminar</b>. La visualización es pública.
                    </div>
                    <div class="col-md-4">
                        <input type="password" id="pass" class="form-control" placeholder="Contraseña (admin123)">
                    </div>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <h5 id="form-title" class="text-primary mb-3">📝 Registrar Nuevo Guerrero</h5>
            <input type="hidden" id="p-id">
            
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label-custom">Nombre</label>
                    <input type="text" id="p-nombre" class="form-control" placeholder="Ej. Vegeta">
                </div>
                <div class="col-md-2">
                    <label class="form-label-custom">Edad (Máx 3 cifras)</label>
                    <input type="number" id="p-edad" class="form-control" oninput="if(value.length>3)value=value.slice(0,3)">
                </div>
                <div class="col-md-2">
                    <label class="form-label-custom">Poder (Máx 3 cifras)</label>
                    <input type="number" id="p-poder" class="form-control" oninput="if(value.length>3)value=value.slice(0,3)">
                </div>
                <div class="col-md-3">
                    <label class="form-label-custom">Universo</label>
                    <input type="text" id="p-universo" class="form-control" placeholder="Universo 7">
                </div>
                <div class="col-md-2 d-flex align-items-end gap-2">
                    <button onclick="enviarDatos('POST')" id="btn-guardar" class="btn btn-primary w-100">Guardar</button>
                    <button onclick="enviarDatos('PUT')" id="btn-actualizar" class="btn btn-warning w-100 d-none">Actualizar</button>
                    <button onclick="cancelarEdicion()" id="btn-cancelar" class="btn btn-secondary d-none">✖</button>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="text-success m-0">📋 Lista General de Guerreros</h5>
                <button onclick="cargarTodos()" class="btn btn-outline-success btn-sm">🔄 Refrescar Lista</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Guerrero</th>
                            <th>Edad</th>
                            <th>Rango</th>
                            <th>Nivel Poder</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="text-center mt-3 pb-5">
            <a href="swagger.html" class="btn btn-link text-decoration-none text-muted">Ver Documentación Técnica (Swagger)</a>
        </div>
    </div>

    <script>
        const API_URL = '/cgi-bin/api.pl';

        // 1. CARGAR TODOS LOS GUERREROS
        async function cargarTodos() {
            try {
                const res = await fetch(API_URL);
                const json = await res.json();
                const tbody = document.getElementById('tabla-cuerpo');
                tbody.innerHTML = '';

                if(!json || json.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-muted p-4">No hay personajes registrados.</td></tr>';
                    return;
                }

                json.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="id-badge">${p.id}</span></td>
                            <td><b class="text-dark">${p.nombre}</b><br><small class="text-muted">${p.universo || 'N/A'}</small></td>
                            <td>${p.edad} años</td>
                            <td><span class="rango-badge bg-light text-dark border">${p.rango}</span></td>
                            <td><span class="badge bg-warning text-dark">${p.nivel_poder || 0}</span></td>
                            <td>
                                <button onclick='prepararEdicion(${JSON.stringify(p)})' class="btn btn-sm btn-outline-warning me-1">Editar</button>
                                <button onclick="borrar(${p.id})" class="btn btn-sm btn-delete">Eliminar</button>
                            </td>
                        </tr>`;
                });
            } catch (e) { 
                console.error("Error:", e); 
            }
        }

        // 2. PREPARAR EL FORMULARIO PARA EDITAR (PUT)
        function prepararEdicion(p) {
            document.getElementById('form-title').innerText = "✏️ Editando Guerrero #" + p.id;
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-nombre').value = p.nombre;
            document.getElementById('p-edad').value = p.edad;
            document.getElementById('p-poder').value = p.nivel_poder;
            document.getElementById('p-universo').value = p.universo;

            // Cambiar botones
            document.getElementById('btn-guardar').classList.add('d-none');
            document.getElementById('btn-actualizar').classList.remove('d-none');
            document.getElementById('btn-cancelar').classList.remove('d-none');
            
            window.scrollTo(0, 0); // Sube la pantalla al formulario
        }

        // 3. CANCELAR EDICIÓN
        function cancelarEdicion() {
            document.getElementById('form-title').innerText = "📝 Registrar Nuevo Guerrero";
            document.getElementById('p-id').value = '';
            document.getElementById('p-nombre').value = '';
            document.getElementById('p-edad').value = '';
            document.getElementById('p-poder').value = '';
            document.getElementById('p-universo').value = '';

            document.getElementById('btn-guardar').classList.remove('d-none');
            document.getElementById('btn-actualizar').classList.add('d-none');
            document.getElementById('btn-cancelar').classList.add('d-none');
        }

        // 4. ENVIAR DATOS (POST o PUT)
        async function enviarDatos(metodo) {
            const pass = document.getElementById('pass').value;
            const data = {
                nombre: document.getElementById('p-nombre').value,
                edad: parseInt(document.getElementById('p-edad').value),
                nivel_poder: parseInt(document.getElementById('p-poder').value),
                universo: document.getElementById('p-universo').value
            };

            if(metodo === 'PUT') {
                data.id = parseInt(document.getElementById('p-id').value);
            }

            if(!data.nombre || isNaN(data.edad)) return alert("Nombre y Edad son obligatorios");

            const res = await fetch(API_URL, { 
                method: metodo, 
                headers: { 
                    'X-Auth-Token': pass,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data) 
            });

            const result = await res.json();
            if(result.error) {
                alert("❌ Error: " + result.error);
            } else {
                cancelarEdicion();
                cargarTodos();
                alert(metodo === 'POST' ? "✅ Registrado" : "✅ Actualizado");
            }
        }

        // 5. ELIMINAR (DELETE)
        async function borrar(id) {
            const pass = document.getElementById('pass').value;
            if(!confirm(`¿Eliminar al guerrero #${id}?`)) return;

            const res = await fetch(`${API_URL}?id=${id}`, { 
                method: 'DELETE',
                headers: { 'X-Auth-Token': pass } 
            });

            const result = await res.json();
            if(result.error) alert("❌ " + result.error);
            else cargarTodos();
        }

        // Carga inicial al abrir la página
        window.onload = cargarTodos;
    </script>
</body>
</html>
