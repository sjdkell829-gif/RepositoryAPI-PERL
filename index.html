<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Anime API - Seguridad y Validaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { border-radius: 12px; margin-bottom: 20px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .login-box { background: #e9ecef; border-left: 5px solid #0d6efd; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">🐉 Sistema de Guerreros con Login</h2>

        <div class="card p-3 login-box mb-4">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <strong>Acceso de Administrador:</strong> <small>Para Registrar/Editar/Borrar necesitas la clave.</small>
                </div>
                <div class="col-md-4">
                    <input type="password" id="pass" class="form-control" placeholder="Contraseña (admin123)">
                </div>
            </div>
        </div>

        <div class="card p-4">
            <h6 class="text-primary">Nuevo Guerrero (Max 3 cifras en Edad/Poder)</h6>
            <div class="row g-2">
                <div class="col-md-3"><input type="text" id="p-nombre" class="form-control" placeholder="Nombre"></div>
                <div class="col-md-2"><input type="number" id="p-edad" class="form-control" placeholder="Edad" oninput="if(value.length>3)value=value.slice(0,3)"></div>
                <div class="col-md-3"><input type="number" id="p-poder" class="form-control" placeholder="Poder" oninput="if(value.length>3)value=value.slice(0,3)"></div>
                <div class="col-md-2"><input type="text" id="p-universo" class="form-control" placeholder="Universo"></div>
                <div class="col-md-2"><button onclick="agregar()" class="btn btn-primary w-100">Registrar</button></div>
            </div>
        </div>

        <div class="card p-4">
            <div class="d-flex justify-content-between mb-3">
                <h5>Lista de Personajes</h5>
                <button onclick="cargar()" class="btn btn-sm btn-success">🔄 Ver Todos</button>
            </div>
            <table class="table text-center">
                <thead class="table-dark">
                    <tr><th>ID</th><th>Nombre</th><th>Edad</th><th>Rango</th><th>Poder</th><th>Eliminar</th></tr>
                </thead>
                <tbody id="tabla"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL = '/cgi-bin/api.pl';

        async function cargar() {
            const res = await fetch(URL);
            const json = await res.json();
            const tbody = document.getElementById('tabla');
            tbody.innerHTML = '';
            json.data.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.nombre}</td>
                        <td>${p.edad}</td>
                        <td><span class="badge bg-info">${p.rango}</span></td>
                        <td>${p.nivel_poder}</td>
                        <td><button onclick="borrar(${p.id})" class="btn btn-sm btn-danger">🗑️</button></td>
                    </tr>`;
            });
        }

        async function agregar() {
            const pass = document.getElementById('pass').value;
            const data = {
                nombre: document.getElementById('p-nombre').value,
                edad: parseInt(document.getElementById('p-edad').value),
                nivel_poder: parseInt(document.getElementById('p-poder').value),
                universo: document.getElementById('p-universo').value
            };

            const res = await fetch(URL, { 
                method: 'POST', 
                headers: { 'X-Auth-Token': pass }, // Enviamos la clave aquí
                body: JSON.stringify(data) 
            });
            const result = await res.json();
            if(result.error) alert(result.error);
            else cargar();
        }

        async function borrar(id) {
            const pass = document.getElementById('pass').value;
            if(!confirm("¿Borrar?")) return;
            const res = await fetch(`${URL}?id=${id}`, { 
                method: 'DELETE',
                headers: { 'X-Auth-Token': pass } 
            });
            const result = await res.json();
            if(result.error) alert(result.error);
            else cargar();
        }

        window.onload = cargar;
    </script>
</body>
</html>
