<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Anime API - Sistema Completo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: none; }
        .id-destacado { color: #0d6efd; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">🐉 Panel de Guerreros Z</h2>

        <div class="card p-3 bg-light border-start border-primary border-5">
            <div class="row align-items-center">
                <div class="col-md-9"><strong>Modo Administrador:</strong> Ingresa la clave para realizar cambios.</div>
                <div class="col-md-3"><input type="password" id="pass" class="form-control" placeholder="Contraseña"></div>
            </div>
        </div>

        <div class="card p-4">
            <h6 class="text-secondary">🔍 Buscar Guerrero Específico</h6>
            <div class="row g-2">
                <div class="col-md-4"><input type="number" id="buscar-id" class="form-control" placeholder="Ingresa ID del guerrero"></div>
                <div class="col-md-2"><button onclick="buscarUno()" class="btn btn-info w-100 text-white">Buscar</button></div>
                <div id="resultado-busqueda" class="col-md-6 pt-2"></div>
            </div>
        </div>

        <div class="card p-4">
            <h6 class="text-primary">📝 Registrar Nuevo Personaje</h6>
            <div class="row g-2">
                <div class="col-md-3"><input type="text" id="p-nombre" class="form-control" placeholder="Nombre"></div>
                <div class="col-md-2"><input type="number" id="p-edad" class="form-control" placeholder="Edad" oninput="limit3(this)"></div>
                <div class="col-md-2"><input type="number" id="p-poder" class="form-control" placeholder="Poder" oninput="limit3(this)"></div>
                <div class="col-md-3"><input type="text" id="p-universo" class="form-control" placeholder="Universo"></div>
                <div class="col-md-2"><button onclick="agregar()" class="btn btn-primary w-100">Guardar</button></div>
            </div>
        </div>

        <div class="card p-4">
            <div class="d-flex justify-content-between mb-3">
                <h5>📋 Lista de Todos los Guerreros</h5>
                <button onclick="cargarTodos()" class="btn btn-success">🔄 Actualizar Lista</button>
            </div>
            <table class="table align-middle text-center">
                <thead class="table-dark">
                    <tr><th>ID</th><th>Nombre</th><th>Edad</th><th>Rango</th><th>Poder</th><th>Acción</th></tr>
                </thead>
                <tbody id="tabla"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL = '/cgi-bin/api.pl';

        function limit3(el) { if(el.value.length > 3) el.value = el.value.slice(0,3); }

        // GET: Buscar solo uno
        async function buscarUno() {
            const id = document.getElementById('buscar-id').value;
            if(!id) return;
            const res = await fetch(`${URL}?id=${id}`);
            const p = await res.json();
            const div = document.getElementById('resultado-busqueda');
            if(p.error) {
                div.innerHTML = `<span class="text-danger">❌ ${p.error}</span>`;
            } else {
                div.innerHTML = `✅ <b>Encontrado:</b> ${p.nombre} (${p.rango}) - Poder: ${p.nivel_poder}`;
            }
        }

        // GET: Cargar todos
        async function cargarTodos() {
            const res = await fetch(URL);
            const json = await res.json();
            const tbody = document.getElementById('tabla');
            tbody.innerHTML = '';
            json.data.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td class="id-destacado">${p.id}</td>
                        <td>${p.nombre}</td>
                        <td>${p.edad}</td>
                        <td><span class="badge bg-primary">${p.rango}</span></td>
                        <td>${p.nivel_poder}</td>
                        <td><button onclick="borrar(${p.id})" class="btn btn-sm btn-outline-danger">Eliminar</button></td>
                    </tr>`;
            });
        }

        // POST: Agregar con Edad
        async function agregar() {
            const pass = document.getElementById('pass').value;
            const data = {
                nombre: document.getElementById('p-nombre').value,
                edad: parseInt(document.getElementById('p-edad').value),
                nivel_poder: parseInt(document.getElementById('p-poder').value),
                universo: document.getElementById('p-universo').value
            };
            const res = await fetch(URL, { 
                method: 'POST', 
                headers: { 'X-Auth-Token': pass },
                body: JSON.stringify(data) 
            });
            const result = await res.json();
            if(result.error) alert(result.error); else cargarTodos();
        }

        async function borrar(id) {
            const pass = document.getElementById('pass').value;
            if(!confirm("¿Borrar?")) return;
            const res = await fetch(`${URL}?id=${id}`, { 
                method: 'DELETE', 
                headers: { 'X-Auth-Token': pass } 
            });
            const result = await res.json();
            if(result.error) alert(result.error); else cargarTodos();
        }

        window.onload = cargarTodos;
    </script>
</body>
</html>
